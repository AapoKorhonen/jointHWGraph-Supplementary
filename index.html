<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  display: flex;
}

#network {
  flex: 1;
  height: 100%;
  border-right: 1px solid #ccc;
}

#sidebar {
  width: 300px;
  height: 100%;
  overflow-y: auto;
  padding: 10px;
  box-sizing: border-box;
  border-left: 1px solid #ccc;
  background-color: #f9f9f9;
}

#sidebar h3 {
  margin-top: 0;
}

#geneList button {
  display: block;
  width: 100%;
  margin: 2px 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  padding: 2px 4px;
}

#geneList button:hover {
  background-color: #ddd;
}
</style>

<div id="sidebar">
  <input id="searchBox" placeholder="Search gene">
  <button onclick="searchNode()">Search</button>

  <h3>All genes (number of connections)</h3>
  <div id="geneList"></div>
</div>

<div id="network"></div>

<script>

// Globaalit muuttujat
let network;
let nodeNames = [];
let edgesData; // edgejen DataSet

fetch("matrix1.txt")
  .then(r => r.text())
  .then(text => {

    const lines = text.trim().split("\n");

    // Poista lainausmerkit
    let names = lines[0].trim().split(/[ ,]+/).map(n => n.replace(/"/g,''));

    const A = lines.slice(1).map(line =>
      line.trim().split(/[ ,]+/).map(Number)
    );

    buildNetwork(A, names);
    buildGeneList(names);

  });


function buildNetwork(A, names){

  nodeNames = names;  // hakua varten

  let nodes = [];
  let edges = [];

  for(let i=0;i<names.length;i++){
    nodes.push({ id:i, label:names[i] });
  }

  for(let i=0;i<A.length;i++){
    for(let j=i+1;j<A[i].length;j++){
      if(A[i][j] === 1){
        edges.push({from:i, to:j});
      }
    }
  }

  const container = document.getElementById("network");

  edgesData = new vis.DataSet(edges); // tallennetaan global edgeille

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: edgesData
  };

  const options = {
    physics: {
      enabled: true,
      solver: "barnesHut",
      barnesHut: {
        gravitationalConstant: -2000,
        springLength: 50,
        springConstant: 0.025,
        damping: 0.3
      },
      stabilization: { enabled: true, iterations: 200 }
    }
  };

  network = new vis.Network(container, data, options);

}

// Hakufunktio
function searchNode(){
  const text = document.getElementById("searchBox").value.toLowerCase();
  let id = -1;
  for(let i=0;i<nodeNames.length;i++){
    if(nodeNames[i].toLowerCase() === text){
      id = i;
      break;
    }
  }
  if(id === -1){
    alert("Gene not found");
    return;
  }
  network.selectNodes([id]);
  network.focus(id, { scale: 1.5, animation: true });
}

// Luo gene-listan oikeaan reunaan
function buildGeneList(names){
  const container = document.getElementById("geneList");

  // aakkosjärjestys
  const sortedNames = [...names].sort();

  sortedNames.forEach(name => {
    const idx = nodeNames.indexOf(name); // id networkiin

    // laske degree
    const degree = network ? network.getConnectedEdges(idx).length : 0;

    const btn = document.createElement("button");
    btn.textContent = `${name} (${degree})`; // näytä degree
    btn.onclick = () => {
      network.selectNodes([idx]);
      network.focus(idx, { scale: 1.5, animation: true });
    };
    container.appendChild(btn);
  });
}
</script>
