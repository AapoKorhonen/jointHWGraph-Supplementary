<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

#network {
  width: 100vw;
  height: 100vh;
}

</style>

</head>

<body>

<div id="network"></div>

<script>

fetch("matrix.txt")
  .then(r => r.text())
  .then(text => {

    const lines = text.trim().split("\n");

    const names = lines[0].trim().split(/[ ,]+/);

    const A = lines.slice(1).map(line =>
      line.trim().split(/[ ,]+/).map(Number)
    );

    buildNetwork(A, names);

  });


function buildNetwork(A, names){

  let nodes = [];
  let edges = [];

  for(let i=0;i<names.length;i++){
    nodes.push({
      id:i,
      label:names[i]
    });
  }

  for(let i=0;i<A.length;i++){
    for(let j=0;j<A[i].length;j++){
      if(A[i][j] === 1){
        edges.push({from:i, to:j});
      }
    }
  }

  const container = document.getElementById("network");

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {
    physics: true,
    interaction: {
      zoomView: true,
      dragView: true
    }
  };

  new vis.Network(container, data, options);
}

</script>

</body>
</html>
