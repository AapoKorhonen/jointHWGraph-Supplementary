<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<div id="network" style="width:800px;height:600px;"></div>

<script>

fetch("matrix.txt")
  .then(r => r.text())
  .then(text => {

    const lines = text.trim().split("\n");

    const names = lines[0].trim().split(/[ ,]+/);

    const A = lines.slice(1).map(line =>
      line.trim().split(/[ ,]+/).map(Number)
    );

    buildNetwork(A, names);

  });


function buildNetwork(A, names){

  let nodes = [];
  let edges = [];

  for(let i=0;i<names.length;i++){
    nodes.push({
      id:i,
      label:names[i]
    });
  }

  for(let i=0;i<A.length;i++){
    for(let j=i+1;j<A[i].length;j++){
      if(A[i][j] === 1){
        edges.push({from:i, to:j});
      }
    }
  }

  const container = document.getElementById("network");

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {

    physics: {
      enabled: true,
      solver: "barnesHut",

      barnesHut: {
        gravitationalConstant: -2000,
        springLength: 50,
        springConstant: 0.005,
        damping: 0.3
      },

      stabilization: {
        enabled: true,
        iterations: 200
      }
    }

  };

  const network = new vis.Network(container, data, options);


}

</script>
