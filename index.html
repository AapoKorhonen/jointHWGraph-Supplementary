<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<!-- 1. Hakukenttä ja nappi -->
<input id="searchBox" placeholder="Search node">
<button onclick="searchNode()">Search</button>

<div id="network" style="width:1920px;height:1080px;"></div>

<script>

// 2. Globaalit muuttujat hakua varten
let network;
let nodeNames = [];

fetch("matrix.txt")
  .then(r => r.text())
  .then(text => {

    const lines = text.trim().split("\n");

    const names = lines[0].trim().split(/[ ,]+/);

    const A = lines.slice(1).map(line =>
      line.trim().split(/[ ,]+/).map(Number)
    );

    buildNetwork(A, names);

  });


function buildNetwork(A, names){

  nodeNames = names;  // tallenna globaalisti hakua varten

  let nodes = [];
  let edges = [];

  for(let i=0;i<names.length;i++){
    nodes.push({
      id:i,
      label:names[i]
    });
  }

  for(let i=0;i<A.length;i++){
    for(let j=i+1;j<A[i].length;j++){
      if(A[i][j] === 1){
        edges.push({from:i, to:j});
      }
    }
  }

  const container = document.getElementById("network");

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {

    physics: {
      enabled: true,
      solver: "barnesHut",

      barnesHut: {
        gravitationalConstant: -2000,
        springLength: 50,
        springConstant: 0.005,
        damping: 0.3
      },

      stabilization: {
        enabled: true,
        iterations: 200
      }
    }

  };

  network = new vis.Network(container, data, options);

}

// 3. Hakufunktio
function searchNode(){

  const text = document.getElementById("searchBox").value.toLowerCase();

  let id = -1;

  for(let i=0;i<nodeNames.length;i++){
    if(nodeNames[i].toLowerCase() === text){
      id = i;
      break;
    }
  }

  if(id === -1){
    alert("Node not found");
    return;
  }

  // Valitse ja zoomaa node
  network.selectNodes([id]);
  network.focus(id, {
    scale: 1.5,
    animation: true
  });

}
</script>
