<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<div id="network" style="width:800px;height:600px;"></div>

<script>

fetch("matrix.txt")
  .then(r => r.text())
  .then(text => {

    const lines = text.trim().split("\n");

    // first row = names
    const names = lines[0].trim().split(/[ ,]+/);

    // rest = matrix
    const A = lines.slice(1).map(line =>
      line.trim().split(/[ ,]+/).map(Number)
    );

    buildNetwork(A, names);

  });


function buildNetwork(A, names){

  let nodes = [];
  let edges = [];

  for(let i=0;i<names.length;i++){
    nodes.push({
      id:i,
      label:names[i]
    });
  }

  for(let i=0;i<A.length;i++){
    for(let j=i+1;j<A[i].length;j++){
      if(A[i][j] === 1){
        edges.push({from:i, to:j});
      }
    }
  }

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  new vis.Network(
    document.getElementById("network"),
    data,
    {physics:true,
     stabilization: {
      enabled: true}}
  );
}

</script>
